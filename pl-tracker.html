<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Tracker — Favorable Odds</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy-mid: #1a2e44;
  --navy-light: #233d57;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-pale: #fdf6e3;
  --cream: #f9f5ef;
  --white: #ffffff;
  --green: #1a6645;
  --green-light: #e8f5ee;
  --green-text: #0d4a30;
  --red: #8b2020;
  --red-light: #fceaea;
  --red-text: #6b1515;
  --muted: #7a8a99;
  --border: #ddd8d0;
  --border-dark: #b8b0a4;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 2px 16px rgba(13,27,42,0.08);
  --shadow-lg: 0 8px 40px rgba(13,27,42,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); min-height: 100vh; font-size: 15px; }
header { background: var(--navy); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.25); }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
.logo-text { display: flex; flex-direction: column; line-height: 1.15; }
.logo-name { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--white); letter-spacing: 0.01em; }
.logo-sub { font-size: 11px; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; }
.client-pill { display: flex; align-items: center; gap: 8px; background: var(--navy-mid); border: 1px solid var(--navy-light); border-radius: 24px; padding: 6px 14px; }
.client-pill label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin: 0; white-space: nowrap; }
.client-pill select { background: transparent; border: none; color: var(--white); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; max-width: 180px; }
.client-pill select option { background: var(--navy); }
.btn-ghost { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 7px 16px; border-radius: 20px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-ghost:hover { background: var(--gold); color: var(--navy); }
main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.add-client-strip { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: none; box-shadow: var(--shadow); animation: slideDown 0.2s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.strip-title { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--navy); margin-bottom: 1rem; }
.tab-bar { display: flex; gap: 4px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 5px; margin-bottom: 1.75rem; box-shadow: var(--shadow); width: fit-content; }
.tab-btn { padding: 8px 22px; border: none; border-radius: 9px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--muted); background: transparent; cursor: pointer; transition: all 0.18s; }
.tab-btn:hover { color: var(--navy); background: var(--cream); }
.tab-btn.active { background: var(--navy); color: var(--white); box-shadow: 0 2px 8px rgba(13,27,42,0.2); }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow); }
.card-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--navy); margin-bottom: 1.25rem; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--navy); background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; width: 100%; transition: border-color 0.15s, box-shadow 0.15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); background: var(--white); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.full-width { grid-column: 1 / -1; }
.btn-primary { background: var(--navy); color: var(--white); border: none; border-radius: var(--radius); padding: 10px 24px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.18s, transform 0.1s; }
.btn-primary:hover { background: var(--navy-mid); }
.btn-primary:active { transform: scale(0.98); }
.btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--border-dark); border-radius: var(--radius); padding: 9px 20px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-outline:hover { background: var(--cream); border-color: var(--navy); }
.btn-gold { background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius); padding: 10px 24px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.18s; }
.btn-gold:hover { background: var(--gold-light); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid #f0b8b8; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
.btn-danger:hover { background: var(--red-light); }
.btn-row { display: flex; align-items: center; gap: 12px; margin-top: 1.25rem; flex-wrap: wrap; }
.type-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--cream); }
.type-btn { flex: 1; padding: 9px 0; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s; color: var(--muted); }
.type-btn.active-income { background: var(--green); color: var(--white); }
.type-btn.active-expense { background: var(--red); color: var(--white); }
.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 1.75rem; }
.metric-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1rem; text-align: center; box-shadow: var(--shadow); }
.metric-card.accent-navy { border-top: 3px solid var(--navy); }
.metric-card.accent-green { border-top: 3px solid var(--green); }
.metric-card.accent-red { border-top: 3px solid var(--red); }
.metric-card.accent-gold { border-top: 3px solid var(--gold); }
.metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 8px; }
.metric-value { font-family: 'DM Serif Display', serif; font-size: 26px; line-height: 1; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--red); }
.metric-value.navy { color: var(--navy); }
.metric-value.gold { color: #a07820; }
.tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.03em; }
.tag-income { background: var(--green-light); color: var(--green-text); }
.tag-expense { background: var(--red-light); color: var(--red-text); }
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; background: var(--white); }
thead { background: var(--navy); color: var(--white); }
thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
tbody tr { transition: background 0.12s; }
tbody tr:hover { background: var(--cream); }
tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--navy); }
tbody tr:last-child td { border-bottom: none; }
.amount-positive { color: var(--green); font-weight: 600; }
.amount-negative { color: var(--red); font-weight: 600; }
.filter-bar { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: flex-end; }
.filter-bar .field-group { min-width: 140px; flex: 1; }
.report-header { background: var(--navy); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; color: var(--white); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
.report-client-name { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.1; margin-bottom: 4px; }
.report-period { font-size: 14px; color: var(--gold-light); font-weight: 300; }
.report-generated { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; }
.report-logo { width: 56px; height: 56px; object-fit: contain; border-radius: 10px; }
.breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
.breakdown-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
.breakdown-header { padding: 1rem 1.25rem; font-family: 'DM Serif Display', serif; font-size: 16px; border-bottom: 1px solid var(--border); }
.breakdown-header.income { color: var(--green); background: var(--green-light); }
.breakdown-header.expense { color: var(--red); background: var(--red-light); }
.breakdown-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.breakdown-table td { padding: 9px 16px; border-bottom: 1px solid var(--border); }
.breakdown-table tr:last-child td { border-bottom: none; font-weight: 600; background: var(--cream); }
.breakdown-table .pct { color: var(--muted); font-size: 12px; text-align: right; }
.breakdown-table .amt { font-weight: 500; text-align: right; }
.summary-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.25rem; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.summary-row:last-child { border-bottom: none; }
.summary-row.total { border-top: 2px solid var(--navy); border-bottom: none; padding-top: 14px; margin-top: 6px; }
.summary-row.total .lbl { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--navy); }
.summary-row.total .amt { font-family: 'DM Serif Display', serif; font-size: 22px; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 14px; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 9999; display: none; animation: toastIn 0.25s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.toast.success { border-left: 4px solid var(--gold); }
.toast.error { border-left: 4px solid var(--red); }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.section-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--navy); }
@media print {
  header, .tab-bar, .filter-bar, .btn-row, .btn-outline, .btn-gold, button { display: none !important; }
  body { background: white; }
  .report-header { background: var(--navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .breakdown-header.income, .breakdown-header.expense { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
@media (max-width: 680px) {
  .form-grid { grid-template-columns: 1fr; }
  .metrics-row { grid-template-columns: 1fr 1fr; }
  .breakdown-grid { grid-template-columns: 1fr; }
  .full-width { grid-column: 1; }
  .header-right { gap: 8px; }
  .client-pill { padding: 5px 10px; }
}
</style>
</head>

          <input type="date" id="txDate">
        </div>
        <div class="field-group">
          <span class="field-label">Transaction Type</span>
          <div class="type-toggle">
            <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">Income</button>
            <button class="type-btn" id="btnExpense" onclick="setType('expense')">Expense</button>
          </div>
        </div>
        <div class="field-group">
          <span class="field-label">Category</span>
          <select id="txCat"></select>
        </div>
        <div class="field-group">
          <span class="field-label">Amount ($)</span>
          <input type="number" id="txAmt" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="field-group full-width">
          <span class="field-label">Description / Reference</span>
          <input id="txDesc" placeholder="e.g. Invoice #42 – ABC Corp, or Bank fee – Chase">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="addTx()">Add Transaction</button>
      </div>
    </div>
    <div class="section-header">
      <div class="section-title">Recent Transactions</div>
    </div>
    <div id="recentList"></div>
  </div>

  <!-- LEDGER VIEW -->
  <div id="view-ledger" style="display:none">
    <div class="filter-bar">
      <div class="field-group">
        <span class="field-label">Filter by Month</span>
        <select id="ledgerMonth" onchange="renderLedger()"><option value="">All months</option></select>
      </div>
      <div class="field-group">
        <span class="field-label">Filter by Type</span>
        <select id="ledgerType" onchange="renderLedger()">
          <option value="">All</option>
          <option value="income">Income only</option>
          <option value="expense">Expenses only</option>
        </select>
      </div>
      <button class="btn-outline" onclick="exportLedgerCSV()" style="white-space:nowrap">&#8595; Export Ledger CSV</button>
    </div>
    <div id="ledgerTable"></div>
  </div>

  <!-- REPORT VIEW -->
  <div id="view-report" style="display:none">
    <div class="filter-bar" style="margin-bottom:1.5rem">
      <div class="field-group">
        <span class="field-label">Year</span>
        <select id="repYear" onchange="populateRepMonths();renderReport()"></select>
      </div>
      <div class="field-group">
        <span class="field-label">Period</span>
        <select id="repMonth" onchange="renderReport()"><option value="">Full Year</option></select>
      </div>
      <button class="btn-outline" onclick="exportReportCSV()" style="white-space:nowrap">&#8595; Export Report CSV</button>
      <button class="btn-gold" onclick="window.print()" style="white-space:nowrap">Print / Save PDF</button>
    </div>
    <div id="reportOut"></div>
  </div>
</main>

const INCOME_CATS = ["Sales / Revenue","Service Fees","Consulting Income","Rental Income","Interest Received","Refunds Received","Other Income"];
const EXPENSE_CATS = ["Cost of Goods Sold","Wages & Salaries","Payroll Taxes","Rent & Utilities","Office Supplies","Software & Subscriptions","Advertising & Marketing","Meals & Entertainment","Travel & Transportation","Professional Services","Insurance","Repairs & Maintenance","Depreciation","Bank Fees","Taxes & Licenses","Other Expenses"];

let state = { clients: {}, currentClient: null };
let currentType = 'income';

function save() { try { localStorage.setItem('fo_pl_tracker', JSON.stringify(state)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('fo_pl_tracker'); if (d) state = JSON.parse(d); } catch(e) {} }

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 2800);
}

function clientTxs() { return state.clients[state.currentClient]?.txs || []; }
function setClientTxs(arr) { if (state.clients[state.currentClient]) state.clients[state.currentClient].txs = arr; }
function fmt(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n); }
function monthLabel(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return new Date(y, mo - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function setType(type) {
  currentType = type;
  document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  updateCats();
}

function updateCats() {
  const sel = document.getElementById('txCat');
  const cats = currentType === 'income' ? INCOME_CATS : EXPENSE_CATS;
  sel.innerHTML = cats.map(c => `<option>${c}</option>`).join('');
}

function populateClientSel() {
  const sel = document.getElementById('clientSel');
  const ids = Object.keys(state.clients);
  if (!ids.length) { sel.innerHTML = '<option value="">— No clients yet —</option>'; state.currentClient = null; return; }
  sel.innerHTML = ids.map(id => `<option value="${id}">${state.clients[id].name}</option>`).join('');
  if (state.currentClient && state.clients[state.currentClient]) { sel.value = state.currentClient; }
  else { state.currentClient = ids[0]; sel.value = ids[0]; }
}

function switchClient() { state.currentClient = document.getElementById('clientSel').value; save(); refreshAll(); }

function toggleNewClient() {
  const b = document.getElementById('newClientBox');
  b.style.display = (b.style.display === 'none' || b.style.display === '') ? 'block' : 'none';
}

function addClient() {
  const name = document.getElementById('newClientName').value.trim();
  const biz = document.getElementById('newClientBiz').value.trim();
  if (!name) { toast('Please enter a client name.', 'error'); return; }
  const id = 'c_' + Date.now();
  state.clients[id] = { name, biz, txs: [] };
  state.currentClient = id;
  save();
  document.getElementById('newClientBox').style.display = 'none';
  document.getElementById('newClientName').value = '';
  document.getElementById('newClientBiz').value = '';
  populateClientSel(); refreshAll();
  toast('Client "' + name + '" added!');
}

function addTx() {
  if (!state.currentClient) { toast('Add a client first.', 'error'); return; }
  const date = document.getElementById('txDate').value;
  const cat = document.getElementById('txCat').value;
  const amt = parseFloat(document.getElementById('txAmt').value);
  const desc = document.getElementById('txDesc').value.trim();
  if (!date || isNaN(amt) || amt <= 0) { toast('Please enter a valid date and amount.', 'error'); return; }
  const tx = { id: 'tx_' + Date.now(), date, type: currentType, cat, amt, desc };
  const txs = clientTxs(); txs.push(tx); setClientTxs(txs); save();
  document.getElementById('txAmt').value = '';
  document.getElementById('txDesc').value = '';
  toast('Transaction added!');
  renderRecent();
}

function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  setClientTxs(clientTxs().filter(t => t.id !== id)); save(); refreshAll();
  toast('Transaction deleted.');
}

function renderRecent() {
  const txs = clientTxs().slice(-8).reverse();
  const el = document.getElementById('recentList');
  if (!txs.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No transactions yet — add your first one above.</p></div>`; return; }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Description</th><th style="text-align:right">Amount</th><th></th></tr></thead>
    <tbody>` + txs.map(t => `<tr>
      <td>${t.date}</td>
      <td><span class="tag tag-${t.type}">${t.type}</span></td>
      <td>${t.cat}</td>
      <td style="color:var(--muted)">${t.desc || '—'}</td>
      <td class="amount-${t.type==='income'?'positive':'negative'}" style="text-align:right">${t.type==='income'?'+':'−'}${fmt(t.amt)}</td>
      <td><button class="btn-danger" onclick="deleteTx('${t.id}')">Delete</button></td>
    </tr>`).join('') +
    `</tbody></table></div><p style="font-size:12px;color:var(--muted);margin-top:8px;text-align:right">Showing last ${txs.length} transactions. Full history in Ledger tab.</p>`;
}

function allMonths() {
  const months = new Set(clientTxs().map(t => t.date.substring(0, 7)));
  return Array.from(months).sort().reverse();
}

function populateLedgerMonths() {
  const sel = document.getElementById('ledgerMonth');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All months</option>';
  allMonths().forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = monthLabel(m); sel.appendChild(o); });
  if (cur) sel.value = cur;
}

function renderLedger() {
  const month = document.getElementById('ledgerMonth').value;
  const type = document.getElementById('ledgerType').value;
  let txs = clientTxs();
  if (month) txs = txs.filter(t => t.date.startsWith(month));
  if (type) txs = txs.filter(t => t.type === type);
  txs = txs.sort((a, b) => b.date.localeCompare(a.date));
  const el = document.getElementById('ledgerTable');
  if (!txs.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No transactions match this filter.</p></div>`; return; }
  const totalInc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
  const totalExp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Description</th><th style="text-align:right">Amount</th><th></th></tr></thead>
    <tbody>` + txs.map(t => `<tr>
      <td>${t.date}</td>
      <td><span class="tag tag-${t.type}">${t.type}</span></td>
      <td>${t.cat}</td>
      <td style="color:var(--muted)">${t.desc || '—'}</td>
      <td class="amount-${t.type==='income'?'positive':'negative'}" style="text-align:right">${t.type==='income'?'+':'−'}${fmt(t.amt)}</td>
      <td><button class="btn-danger" onclick="deleteTx('${t.id}')">Delete</button></td>
    </tr>`).join('') +
    `</tbody><tfoot style="background:var(--cream)"><tr>
      <td colspan="4" style="padding:10px 14px;font-weight:600;font-size:13px">Totals for selection</td>
      <td style="text-align:right;padding:10px 14px">
        <div class="amount-positive">+${fmt(totalInc)}</div>
        <div class="amount-negative" style="font-size:12px">−${fmt(totalExp)}</div>
      </td><td></td>
    </tr></tfoot></table></div>`;
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportLedgerCSV() {
  const month = document.getElementById('ledgerMonth').value;
  const type = document.getElementById('ledgerType').value;
  let txs = clientTxs();
  if (month) txs = txs.filter(t => t.date.startsWith(month));
  if (type) txs = txs.filter(t => t.type === type);
  txs = txs.sort((a, b) => b.date.localeCompare(a.date));
  const clientName = state.clients[state.currentClient]?.name || 'Client';
  const totalInc = txs.filter(t => t.type==='income').reduce((s,t)=>s+t.amt,0);
  const totalExp = txs.filter(t => t.type==='expense').reduce((s,t)=>s+t.amt,0);
  const rows = [
    [`P&L Ledger — ${clientName}`],
    [`Exported: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`],
    [],
    ['Date','Type','Category','Description','Amount (USD)'],
    ...txs.map(t => [t.date, t.type, t.cat, t.desc||'', (t.type==='income'?'':'-')+t.amt.toFixed(2)]),
    [],
    ['TOTAL INCOME','','','',totalInc.toFixed(2)],
    ['TOTAL EXPENSES','','','','-'+totalExp.toFixed(2)],
    ['NET PROFIT / LOSS','','','',(totalInc-totalExp).toFixed(2)]
  ];
  downloadCSV(rows, `PL_Ledger_${clientName.replace(/\s/g,'_')}.csv`);
  toast('Ledger exported as CSV!');
}

function populateRepYears() {
  const sel = document.getElementById('repYear');
  const txs = clientTxs();
  const years = txs.length ? [...new Set(txs.map(t => t.date.substring(0,4)))].sort().reverse() : [new Date().getFullYear().toString()];
  sel.innerHTML = years.map(y => `<option>${y}</option>`).join('');
}

function populateRepMonths() {
  const sel = document.getElementById('repMonth');
  const year = document.getElementById('repYear').value;
  const txs = clientTxs().filter(t => t.date.startsWith(year));
  const months = [...new Set(txs.map(t => t.date.substring(0,7)))].sort().reverse();
  sel.innerHTML = '<option value="">Full Year</option>' + months.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
}

function renderReport() {
  const year = document.getElementById('repYear')?.value || new Date().getFullYear().toString();
  const month = document.getElementById('repMonth')?.value || '';
  let txs = clientTxs().filter(t => t.date.startsWith(year));
  if (month) txs = txs.filter(t => t.date.startsWith(month));
  const income = txs.filter(t => t.type==='income');
  const expense = txs.filter(t => t.type==='expense');
  const totalInc = income.reduce((s,t)=>s+t.amt,0);
  const totalExp = expense.reduce((s,t)=>s+t.amt,0);
  const net = totalInc - totalExp;
  const margin = totalInc > 0 ? ((net/totalInc)*100).toFixed(1) : '0.0';
  const incByCat = {}; income.forEach(t => { incByCat[t.cat] = (incByCat[t.cat]||0) + t.amt; });
  const expByCat = {}; expense.forEach(t => { expByCat[t.cat] = (expByCat[t.cat]||0) + t.amt; });
  const clientName = state.clients[state.currentClient]?.name || '—';
  const clientBiz = state.clients[state.currentClient]?.biz || '';
  const period = month ? monthLabel(month) : `Full Year ${year}`;
  const generated = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('reportOut').innerHTML = `
  <div id="printArea">
  <div class="report-header">
    <div>
      <div class="report-client-name">${clientName}</div>
      ${clientBiz ? `<div class="report-period">${clientBiz}</div>` : ''}
      <div class="report-period" style="margin-top:4px">Profit &amp; Loss — ${period}</div>
      <div class="report-generated">Generated ${generated} · favorableodds.io</div>
    </div>
    <img src="${LOGO_DATA_URI}" alt="Favorable Odds" class="report-logo">
  </div>
  <div class="metrics-row">
    <div class="metric-card accent-green"><div class="metric-label">Total Income</div><div class="metric-value green">${fmt(totalInc)}</div></div>
    <div class="metric-card accent-red"><div class="metric-label">Total Expenses</div><div class="metric-value red">${fmt(totalExp)}</div></div>
    <div class="metric-card accent-navy"><div class="metric-label">Net ${net>=0?'Profit':'Loss'}</div><div class="metric-value ${net>=0?'green':'red'}">${fmt(Math.abs(net))}</div></div>
    <div class="metric-card accent-gold"><div class="metric-label">Profit Margin</div><div class="metric-value gold">${margin}%</div></div>
  </div>
  <div class="breakdown-grid">
    <div class="breakdown-card">
      <div class="breakdown-header income">Income Breakdown</div>
      ${Object.keys(incByCat).length ? `<table class="breakdown-table"><tbody>`+
        Object.entries(incByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>
          `<tr><td>${cat}</td><td class="amt">${fmt(amt)}</td><td class="pct">${totalInc>0?((amt/totalInc)*100).toFixed(1):0}%</td></tr>`
        ).join('')+
        `<tr><td>Total Income</td><td class="amt">${fmt(totalInc)}</td><td class="pct">100%</td></tr></tbody></table>`
        : '<p style="padding:1rem;color:var(--muted);font-size:13px">No income for this period.</p>'}
    </div>
    <div class="breakdown-card">
      <div class="breakdown-header expense">Expense Breakdown</div>
      ${Object.keys(expByCat).length ? `<table class="breakdown-table"><tbody>`+
        Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>
          `<tr><td>${cat}</td><td class="amt">${fmt(amt)}</td><td class="pct">${totalExp>0?((amt/totalExp)*100).toFixed(1):0}%</td></tr>`
        ).join('')+
        `<tr><td>Total Expenses</td><td class="amt">${fmt(totalExp)}</td><td class="pct">100%</td></tr></tbody></table>`
        : '<p style="padding:1rem;color:var(--muted);font-size:13px">No expenses for this period.</p>'}
    </div>
  </div>
  <div class="summary-card">
    <div style="font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:1rem;color:var(--navy)">Summary Statement</div>
    <div class="summary-row"><span class="lbl">Gross Income</span><span class="amt" style="color:var(--green);font-weight:600">${fmt(totalInc)}</span></div>
    <div class="summary-row"><span class="lbl" style="color:var(--muted)">Less: Total Expenses</span><span class="amt" style="color:var(--red)">(${fmt(totalExp)})</span></div>
    <div class="summary-row total"><span class="lbl">Net ${net>=0?'Profit':'Loss'}</span><span class="amt" style="color:${net>=0?'var(--green)':'var(--red)'}">${fmt(Math.abs(net))}</span></div>
    <p style="margin-top:1.25rem;font-size:11px;color:var(--muted);line-height:1.6">For informational purposes only. Consult a licensed tax professional before using for official filings. Generated by Favorable Odds P&L Tracker · favorableodds.io</p>
  </div>
  </div>`;
}

function exportReportCSV() {
  const year = document.getElementById('repYear')?.value || new Date().getFullYear().toString();
  const month = document.getElementById('repMonth')?.value || '';
  let txs = clientTxs().filter(t => t.date.startsWith(year));
  if (month) txs = txs.filter(t => t.date.startsWith(month));
  const clientName = state.clients[state.currentClient]?.name || 'Client';
  const clientBiz = state.clients[state.currentClient]?.biz || '';
  const period = month ? monthLabel(month) : `Full Year ${year}`;
  const income = txs.filter(t=>t.type==='income');
  const expense = txs.filter(t=>t.type==='expense');
  const totalInc = income.reduce((s,t)=>s+t.amt,0);
  const totalExp = expense.reduce((s,t)=>s+t.amt,0);
  const net = totalInc - totalExp;
  const incByCat = {}; income.forEach(t=>{incByCat[t.cat]=(incByCat[t.cat]||0)+t.amt;});
  const expByCat = {}; expense.forEach(t=>{expByCat[t.cat]=(expByCat[t.cat]||0)+t.amt;});
  const rows = [
    [`PROFIT & LOSS REPORT — ${clientName.toUpperCase()}`],[clientBiz],[`Period: ${period}`],
    [`Generated: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`],[],
    ['INCOME BREAKDOWN'],['Category','Amount (USD)','% of Income'],
    ...Object.entries(incByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>[cat,amt.toFixed(2),totalInc>0?((amt/totalInc)*100).toFixed(1)+'%':'0%']),
    ['TOTAL INCOME',totalInc.toFixed(2),'100%'],[],
    ['EXPENSE BREAKDOWN'],['Category','Amount (USD)','% of Expenses'],
    ...Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>[cat,amt.toFixed(2),totalExp>0?((amt/totalExp)*100).toFixed(1)+'%':'0%']),
    ['TOTAL EXPENSES',totalExp.toFixed(2),'100%'],[],
    ['SUMMARY'],['Gross Income',totalInc.toFixed(2)],['Less: Total Expenses','-'+totalExp.toFixed(2)],
    [net>=0?'NET PROFIT':'NET LOSS',net.toFixed(2)],
    ['Profit Margin',totalInc>0?((net/totalInc)*100).toFixed(1)+'%':'N/A'],[],
    ['For informational purposes only. Consult a tax professional for filing.'],
    ['Generated by Favorable Odds P&L Tracker — favorableodds.io']
  ];
  downloadCSV(rows, `PL_Report_${clientName.replace(/\s/g,'_')}_${period.replace(/\s/g,'_')}.csv`);
  toast('Report exported as CSV!');
}

function showView(v, btn) {
  ['entry','ledger','report'].forEach(n => { document.getElementById('view-'+n).style.display = n===v?'block':'none'; });
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (v==='ledger') { populateLedgerMonths(); renderLedger(); }
  if (v==='report') { populateRepYears(); populateRepMonths(); renderReport(); }
}

function refreshAll() {
  populateClientSel(); updateCats(); renderRecent();
  const dateEl = document.getElementById('txDate');
  if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().split('T')[0];
}

load();
refreshAll();
</script>
